<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Coastal Cruise — Mustang & F1</title>
<style>
  :root { --ui: #fff3d6; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #05131f; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: "Courier New", monospace; touch-action: none; user-select: none;
  }
  #stage { position: relative; width: 100vw; height: 100vh; background: #05131f; }
  canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    image-rendering: auto; display: block;
  }
  #crt {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 3px, rgba(0,0,0,.05) 3px 4px),
      radial-gradient(120% 120% at 50% 50%, rgba(0,0,0,0) 60%, rgba(0,0,0,.40) 100%);
    mix-blend-mode: multiply;
  }
  #hud {
    position: absolute; inset: 0; pointer-events: none; z-index: 6;
    color: var(--ui); text-shadow: 2px 2px 0 #00000088; letter-spacing: 1px;
  }
  .panel { position: absolute; }
  #times { top: 14px; left: 16px; font-size: clamp(12px, 2.4vw, 18px); line-height: 1.5; }
  #times b { color: #ffd34d; }
  #best { color: #8be9a8; }
  #trackname { color:#9fd4ff; font-weight:bold; }
  #speedo { right: 16px; bottom: 16px; text-align: right; }
  #kmh { font-size: clamp(34px, 9vw, 64px); font-weight: bold; color: #ffd34d; line-height: .9; }
  #kmh small { font-size: .35em; color: var(--ui); }
  #bar { width: clamp(120px, 30vw, 220px); height: 10px; margin-top: 8px; margin-left:auto;
         border: 2px solid #ffffff55; background:#0008; }
  #barfill { height: 100%; width: 0%; background: linear-gradient(90deg,#7ee07e,#ffd34d,#ff7a3d); }
  .btn {
    position: absolute; bottom: 18px; z-index: 7; pointer-events: auto;
    padding: 12px 16px; font-family: inherit; font-weight: bold; letter-spacing: 1px;
    font-size: clamp(13px, 3.2vw, 19px); color: #06131e; background: #ffd34d;
    border: 3px solid #fff3d6; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #0007;
    transition: transform .05s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0007; }
  #retry { left: 16px; }
  #menuBtn { left: 50%; transform: translateX(-50%); background:#9fd4ff; }
  #menuBtn:active { transform: translateX(-50%) translateY(3px); }
  #lapmsg {
    position: absolute; top: 16%; left: 0; right: 0; text-align: center;
    font-size: clamp(20px, 6vw, 44px); font-weight: bold; color:#fff;
    opacity: 0; transition: opacity .25s; text-shadow: 3px 3px 0 #c0392b;
  }
  #menu {
    position: absolute; inset: 0; z-index: 10; overflow-y: auto;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 6vh 5vw; gap: 14px; text-align: center; color: var(--ui);
    background: radial-gradient(120% 120% at 50% 20%, #1a3a52 0%, #06131e 80%);
  }
  #menu h1 { font-size: clamp(26px, 7vw, 56px); color:#ffd34d; text-shadow: 4px 4px 0 #c0392b; letter-spacing: 2px; }
  #menu .sub { font-size: clamp(12px, 3vw, 17px); max-width: 560px; line-height: 1.6; opacity:.9; }
  #cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
           gap: 12px; width: 100%; max-width: 620px; margin-top: 8px; }
  .card {
    pointer-events: auto; cursor: pointer; text-align: left;
    background: #0e2433; border: 3px solid #2c5870; border-radius: 12px; padding: 14px;
    transition: transform .08s, border-color .08s; color: var(--ui);
  }
  .card:hover, .card:active { transform: translateY(-3px); border-color: #ffd34d; }
  .card .t { font-size: clamp(16px, 4vw, 22px); font-weight: bold; color:#ffd34d; }
  .card .d { font-size: 12px; opacity:.8; margin-top:4px; }
  .card .pb { font-size: 13px; color:#8be9a8; margin-top:8px; }
  .card .car { font-size: 11px; opacity:.7; margin-top:2px; }
  .hide { display: none !important; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="crt"></div>
    <div id="hud">
      <div class="panel" id="times">
        <span id="trackname">—</span><br>
        TIME <b id="curtime">0:00.00</b><br>
        <span id="best">BEST --:--.--</span>
      </div>
      <div class="panel" id="speedo">
        <div id="kmh">0<small>KM/H</small></div>
        <div id="bar"><div id="barfill"></div></div>
      </div>
      <div id="lapmsg"></div>
    </div>
    <button class="btn" id="retry">↺ RETRY</button>
    <button class="btn" id="menuBtn">☰ CIRCUITS</button>

    <div id="menu">
      <h1>GRAND TOUR</h1>
      <div class="sub">
        Maintiens &amp; glisse <b>gauche–droite</b> pour tourner. Garde ta vitesse en traçant propre.<br>
        Bats ton meilleur tour&nbsp;: un <span style="color:#9fd4ff">ghost</span> rejoue ton record. <b>R</b> / RETRY pour relancer.
      </div>
      <div id="cards"></div>
      <div class="sub" style="margin-top:6px;opacity:.6">
        Tracés F1 d'après les centerlines GPS réelles (Monza · Silverstone · Red Bull Ring).
      </div>
    </div>
  </div>

  // ----------------------- Track building -----------------------
  function catmull(p0,p1,p2,p3,t){
    const t2=t*t,t3=t2*t;
    return [
      0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
      0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3),
    ];
  }
  function makeCoastCP(){
    const cp=[], N=16, RX=760, RY=540;
    for(let i=0;i<N;i++){
      const a=(i/N)*Math.PI*2;
      const r=1+0.22*Math.sin(3*a+0.6)+0.13*Math.cos(2*a)+0.07*Math.sin(5*a);
      cp.push([Math.cos(a)*RX*r, Math.sin(a)*RY*r]);
    }
    return cp;
  }

  function buildTrack(def){
    const sc=def.scale||1;
    const cp=def.cp.map(p=>[p[0]*sc,p[1]*sc]), sub=def.subdiv;
    const pts=[];
    for(let i=0;i<cp.length;i++){
      const p0=cp[(i-1+cp.length)%cp.length], p1=cp[i], p2=cp[(i+1)%cp.length], p3=cp[(i+2)%cp.length];
      for(let s=0;s<sub;s++) pts.push(catmull(p0,p1,p2,p3,s/sub));
    }
    const M=pts.length;
    // tangents + LEFT-of-travel normal (works for any shape, convex or not)
    const tan=[], nrm=[];
    for(let i=0;i<M;i++){
      const a=pts[(i-1+M)%M], b=pts[(i+1)%M];
      let tx=b[0]-a[0], ty=b[1]-a[1]; const l=Math.hypot(tx,ty)||1; tx/=l; ty/=l;
      tan.push([tx,ty]); nrm.push([ty,-tx]); // left of travel
    }
    const T={ name:def.name, theme:def.theme, info:def.info, pts, tan, nrm, M };

    // edge loops (for road band, common to all themes)
    const edge=(d)=>{ const o=[]; for(let i=0;i<M;i++) o.push([pts[i][0]+nrm[i][0]*d, pts[i][1]+nrm[i][1]*d]); return o; };
    T.edgeL=edge(ROAD_HALF); T.edgeR=edge(-ROAD_HALF);

    if(def.theme==='coast'){
      // ocean on LEFT (+nrm). sand strip then open sea.
      T.beachOuter=edge(ROAD_HALF+BEACH_W);
      T.oceanOuter=edge(ROAD_HALF+BEACH_W+900);
      T.palms=[]; T.buildings=[];
      for(let i=0;i<M;i+=9){ const off=ROAD_HALF+BEACH_W+10+(i%3)*6;
        T.palms.push([pts[i][0]+nrm[i][0]*off, pts[i][1]+nrm[i][1]*off]); }
      for(let i=0;i<M;i+=17){ const off=ROAD_HALF+50+(i%4)*30;
        T.buildings.push([pts[i][0]-nrm[i][0]*off, pts[i][1]-nrm[i][1]*off, 18+(i%3)*10, 16+(i%5)*8, i]); }
    } else {
      // circuit: kerbs both edges + grandstands
      T.kerbL=edge(ROAD_HALF+6); T.kerbR=edge(-ROAD_HALF-6);
      T.stands=[];
      for(let i=0;i<M;i+=23){ const off=ROAD_HALF+34+(i%3)*16;
        const side=(i%46<23)?1:-1;
        T.stands.push([pts[i][0]+nrm[i][0]*off*side, pts[i][1]+nrm[i][1]*off*side, tan[i][0],tan[i][1], i]); }
    }
    return T;
  }

  const TRACK_DEFS = [
    { name:"Coastal Test", theme:"coast",   subdiv:26, scale:1,   cp: makeCoastCP(), info:"Cruise · Mustang", car:"mustang" },
    { name:"Monza",        theme:"circuit", subdiv:4,  scale:3.5, cp: F1_TRACKS["Monza"].cp,        info:"5.793 km · Italy",  car:"f1" },
    { name:"Silverstone",  theme:"circuit", subdiv:4,  scale:3.5, cp: F1_TRACKS["Silverstone"].cp,  info:"5.891 km · UK",     car:"f1" },
    { name:"Red Bull Ring",theme:"circuit", subdiv:4,  scale:3.5, cp: F1_TRACKS["Red Bull Ring"].cp,info:"4.318 km · Austria",car:"f1" },
  ];

  // ----------------------- State -----------------------
  let track=null, carKind="mustang", started=false;
  const car = { x:0, y:0, heading:0, speed:MIN_SPEED, steer:0, nearIdx:0, slip:0 };
  let camAngle=0, camX=0, camY=0;
  const smoke=[], skids=[]; let smokeAcc=0;

  // ----------------------- Input -----------------------
  let steerTarget=0, pointerActive=false, dragStartX=0;
  const MAXDRAG=110; let keyL=false, keyR=false;
  const stage=document.getElementById("stage");
  stage.addEventListener("pointerdown", e=>{ pointerActive=true; dragStartX=e.clientX; });
  stage.addEventListener("pointermove", e=>{
    if(!pointerActive) return;
    steerTarget=Math.max(-1,Math.min(1,(e.clientX-dragStartX)/MAXDRAG));
  });
  function releasePtr(){ pointerActive=false; if(!keyL&&!keyR) steerTarget=0; }
  window.addEventListener("pointerup", releasePtr);
  window.addEventListener("pointercancel", releasePtr);
  window.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft"||e.key==="a"){keyL=true;steerTarget=-1;}
    if(e.key==="ArrowRight"||e.key==="d"){keyR=true;steerTarget=1;}
    if((e.key==="r"||e.key==="R"||e.key==="Enter") && started) resetToStart();
  });
  window.addEventListener("keyup", e=>{
    if(e.key==="ArrowLeft"||e.key==="a") keyL=false;
    if(e.key==="ArrowRight"||e.key==="d") keyR=false;
    steerTarget = keyL?-1 : keyR?1 : (pointerActive?steerTarget:0);
  });
  document.getElementById("retry").addEventListener("pointerdown", e=>{ e.stopPropagation(); if(started) resetToStart(); });
  document.getElementById("menuBtn").addEventListener("pointerdown", e=>{ e.stopPropagation(); openMenu(); });

  // ----------------------- Timing + ghost -----------------------
  let lapStart=0, bestLap=null, prevProg=0;
  let ghostRec=[], bestGhost=null, ghostCursor=0;
  const el = id => document.getElementById(id);
  const lapEl=el("curtime"), bestEl=el("best"), nameEl=el("trackname"),
        kmhEl=el("kmh"), barFill=el("barfill"), lapMsg=el("lapmsg");

  function keyBest(){ return "cc_best_"+track.name; }
  function keyGhost(){ return "cc_ghost_"+track.name; }
  function fmt(ms){
    if(ms==null) return "--:--.--";
    const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), cs=Math.floor((ms%1000)/10);
    return m+":"+String(s).padStart(2,"0")+"."+String(cs).padStart(2,"0");
  }
  let msgTimer=0;
  function flash(t,ms=1600){ lapMsg.textContent=t; lapMsg.style.opacity=1; msgTimer=ms; }

  function resetToStart(){
    const p=track.pts, t=track.tan;
    car.x=p[0][0]; car.y=p[0][1];
    car.heading=Math.atan2(t[0][0],-t[0][1]);
    car.speed=MIN_SPEED; car.steer=0; car.nearIdx=0; car.slip=0;
    camAngle=car.heading; camX=car.x; camY=car.y;
    prevProg=0; lapStart=performance.now();
    ghostRec=[]; ghostCursor=0;
    smoke.length=0; skids.length=0; smokeAcc=0;
  }

  function loadTrack(def){
    track=buildTrack(def); carKind=def.car;
    bestLap=null; bestGhost=null;
    try{
      const b=localStorage.getItem(keyBest()); if(b) bestLap=+b;
      const g=localStorage.getItem(keyGhost()); if(g) bestGhost=JSON.parse(g);
    }catch(_){}
    nameEl.textContent=track.name.toUpperCase();
    bestEl.textContent="BEST "+fmt(bestLap);
    document.getElementById("menu").classList.add("hide");
    started=true; resetToStart();
  }
  function openMenu(){
    started=false;
    buildMenu();
    document.getElementById("menu").classList.remove("hide");
  }

  function updateNearest(){
    const p=track.pts, M=track.M;
    let best=car.nearIdx, bd=Infinity;
    for(let d=-12; d<=44; d++){
      const i=(car.nearIdx+d+M)%M;
      const dx=car.x-p[i][0], dy=car.y-p[i][1], dist=dx*dx+dy*dy;
      if(dist<bd){bd=dist;best=i;}
    }
    car.nearIdx=best;
  }

  // ----------------------- Main loop -----------------------
  let last=performance.now();
  function frame(now){
    let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
    if(started) step(dt);
    render();
    requestAnimationFrame(frame);
  }

  function step(dt){
    const p=track.pts, t=track.tan, nrm=track.nrm, M=track.M;
    car.steer += (steerTarget-car.steer)*(1-Math.exp(-10*dt));
    const speedFactor=Math.min(1, car.speed/70+0.15);
    const grip=1-UNDERSTEER*(car.speed/TOP);
    car.heading += car.steer*TURN*speedFactor*grip*dt;

    updateNearest();
    const i=car.nearIdx, cpx=p[i][0], cpy=p[i][1], n=nrm[i];
    const signed=(car.x-cpx)*n[0]+(car.y-cpy)*n[1];
    const onRoad=Math.abs(signed)<=ROAD_HALF;

    const top=onRoad?TOP:TOP_OFF;
    car.speed += (top-car.speed)*(1-Math.exp(-ENGINE*dt));
    const scrub=CORNER_SCRUB*Math.abs(car.steer)*(car.speed/TOP);
    car.speed -= scrub*car.speed*dt;
    if(!onRoad) car.speed -= car.speed*0.6*dt;
    if(car.speed<MIN_SPEED) car.speed=MIN_SPEED;

    const fx=Math.sin(car.heading), fy=-Math.cos(car.heading);
    car.x += fx*car.speed*dt; car.y += fy*car.speed*dt;

    const limit=ROAD_HALF+WALL_PAD;
    const s2=(car.x-cpx)*n[0]+(car.y-cpy)*n[1];
    if(Math.abs(s2)>limit){
      const s=Math.sign(s2);
      car.x=cpx+n[0]*limit*s; car.y=cpy+n[1]*limit*s;
      car.speed*=WALL_HIT;
      if(msgTimer<=0) flash("WALL!",600);
    }

    // drift / smoke / skid
    const drift=Math.max(0, Math.abs(car.steer)*(car.speed/TOP)-DRIFT_START)/(1-DRIFT_START);
    const targetSlip=-car.steer*DRIFT_SLIP*drift;
    car.slip += (targetSlip-car.slip)*(1-Math.exp(-9*dt));
    const rx=Math.cos(car.heading), ry=Math.sin(car.heading);
    const rearX=car.x-fx*11, rearY=car.y-fy*11;
    if(drift>0.05 && onRoad){
      for(const s of [-1,1]) skids.push([rearX+rx*s*7, rearY+ry*s*7, SKID_LIFE]);
      smokeAcc+=SMOKE_RATE*drift*dt;
      while(smokeAcc>=1){ smokeAcc-=1;
        smoke.push({ x:rearX+(Math.random()-0.5)*10, y:rearY+(Math.random()-0.5)*10,
          vx:-fx*8+(Math.random()-0.5)*22, vy:-fy*8+(Math.random()-0.5)*22,
          r:3+Math.random()*3, life:0.6+Math.random()*0.3, max:0.9 }); }
    }
    for(let k=skids.length-1;k>=0;k--){ skids[k][2]-=dt; if(skids[k][2]<=0) skids.splice(k,1); }
    if(skids.length>900) skids.splice(0,skids.length-900);
    for(let k=smoke.length-1;k>=0;k--){ const q=smoke[k]; q.life-=dt;
      if(q.life<=0){smoke.splice(k,1);continue;} q.x+=q.vx*dt; q.y+=q.vy*dt; q.vx*=0.92; q.vy*=0.92; q.r+=14*dt; }

    // ghost record
    const tcur=performance.now()-lapStart;
    if(ghostRec.length===0 || tcur-ghostRec[ghostRec.length-1][0]>=16)
      ghostRec.push([tcur, car.x, car.y, car.heading]);

    // lap
    const prog=i/M;
    if(prevProg>0.8 && prog<0.2){
      const lap=performance.now()-lapStart; lapStart=performance.now();
      if(bestLap===null || lap<bestLap){
        bestLap=lap; bestEl.textContent="BEST "+fmt(bestLap); bestGhost=ghostRec.slice();
        flash("NEW BEST!  "+fmt(lap));
        try{ localStorage.setItem(keyBest(),String(bestLap)); localStorage.setItem(keyGhost(),JSON.stringify(bestGhost)); }catch(_){}
      } else flash("LAP  "+fmt(lap));
      ghostRec=[]; ghostCursor=0;
    }
    prevProg=prog;

    // camera
    const ahead=LOOKAHEAD*(car.speed/TOP);
    const tx2=car.x+fx*ahead, ty2=car.y+fy*ahead;
    camX += (tx2-camX)*(1-Math.exp(-FOLLOW*dt));
    camY += (ty2-camY)*(1-Math.exp(-FOLLOW*dt));
    if(CAM_ROTATE){ let da=car.heading-camAngle; da=Math.atan2(Math.sin(da),Math.cos(da));
      camAngle += da*(1-Math.exp(-ROT_SMOOTH*dt)); } else camAngle=0;

    kmhEl.innerHTML=Math.round(car.speed*KMH)+"<small>KM/H</small>";
    barFill.style.width=Math.min(100,(car.speed/TOP)*100)+"%";
    lapEl.textContent=fmt(performance.now()-lapStart);
    if(msgTimer>0){ msgTimer-=dt*1000; if(msgTimer<=0) lapMsg.style.opacity=0; }
  }

  // ----------------------- Render -----------------------
  function loopPath(loop){ ctx.beginPath(); ctx.moveTo(loop[0][0],loop[0][1]);
    for(let i=1;i<loop.length;i++) ctx.lineTo(loop[i][0],loop[i][1]); ctx.closePath(); }
  function bandPath(a,b){ const M=a.length; ctx.beginPath();
    ctx.moveTo(a[0][0],a[0][1]); for(let i=1;i<M;i++) ctx.lineTo(a[i][0],a[i][1]);
    for(let i=M-1;i>=0;i--) ctx.lineTo(b[i][0],b[i][1]); ctx.closePath(); }

  function render(){
    if(!track){ ctx.fillStyle="#06131e"; ctx.fillRect(0,0,W,H); return; }

    // background
    if(track.theme==='coast'){
      const g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,"#1b6f8c"); g.addColorStop(1,"#0e4a63");
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      const tnow=performance.now()/1000; ctx.fillStyle="#bfe9f2";
      for(let s=0;s<70;s++){ const sx=((s*97)%100)/100, sy=((s*53)%100)/100;
        const tw=0.5+0.5*Math.sin(tnow*2+s);
        if(tw>0.7){ ctx.globalAlpha=(tw-0.7)*2; ctx.fillRect((sx*W)|0,(sy*H*0.9)|0,2,1);} }
      ctx.globalAlpha=1;
    } else {
      ctx.fillStyle="#3f7a34"; ctx.fillRect(0,0,W,H);
    }

    ctx.save();
    const sc=ZOOM*H/BASE_H;   // higher internal res, same on-screen framing
    ctx.translate(W*0.5,H*0.5); ctx.scale(sc,sc); ctx.rotate(-camAngle); ctx.translate(-camX,-camY);

    if(track.theme==='coast'){
      ctx.fillStyle="#5a8a4a"; bandPath(track.edgeR, offsetInland(track)); ctx.fill();   // green land on the right
      ctx.fillStyle="#e8d39b"; bandPath(track.beachOuter, track.edgeL); ctx.fill();      // sand strip on the sea side
    } else {
      // gravel/runoff hint under kerbs
      ctx.fillStyle="#b8a06a"; bandPath(track.kerbL,track.kerbR); ctx.fill();
    }

    // road
    ctx.fillStyle="#3a3f45"; bandPath(track.edgeL,track.edgeR); ctx.fill();

    if(track.theme==='coast'){
      ctx.lineWidth=3; ctx.strokeStyle="#d9dee3"; loopPath(track.edgeR); ctx.stroke();
      ctx.strokeStyle="#caa86a"; loopPath(track.edgeL); ctx.stroke();
      // center dashes
      ctx.strokeStyle="#f4d35e"; ctx.lineWidth=2; ctx.beginPath();
      for(let i=0;i<track.M;i+=4){ const a=track.pts[i], b=track.pts[(i+2)%track.M]; ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); }
      ctx.stroke();
      for(const b of track.buildings){ ctx.fillStyle=(b[4]%2)?"#7a6f63":"#9a5a4a"; ctx.fillRect(b[0]-b[2]/2,b[1]-b[3]/2,b[2],b[3]); }
      for(const pm of track.palms){ ctx.fillStyle="#6b4a2b"; ctx.fillRect(pm[0]-1,pm[1]-1,2,6);
        ctx.fillStyle="#2f8a3e"; ctx.beginPath(); ctx.arc(pm[0],pm[1]-3,5,0,6.28); ctx.fill();
        ctx.fillStyle="#3fae54"; ctx.beginPath(); ctx.arc(pm[0]-2,pm[1]-4,3,0,6.28); ctx.fill(); }
    } else {
      // red/white kerbs on both edges (alternating)
      drawKerb(track.edgeL, track.kerbL);
      drawKerb(track.edgeR, track.kerbR);
      // white edge lines
      ctx.lineWidth=2; ctx.strokeStyle="#e9edf0"; loopPath(track.edgeL); ctx.stroke(); loopPath(track.edgeR); ctx.stroke();
      // grandstands
      for(const s of track.stands){ ctx.save(); ctx.translate(s[0],s[1]); ctx.rotate(Math.atan2(s[3],s[2]));
        ctx.fillStyle="#555b63"; ctx.fillRect(-14,-5,28,10);
        ctx.fillStyle=(s[4]%3===0)?"#c0392b":(s[4]%3===1)?"#2c6fb0":"#d8b13a"; ctx.fillRect(-14,-5,28,3); ctx.restore(); }
    }

    drawStartLine();

    // skids
    for(const s of skids){ ctx.globalAlpha=0.32*(s[2]/SKID_LIFE); ctx.fillStyle="#1c1c1c"; ctx.fillRect(s[0]-1.5,s[1]-1.5,3,3); }
    ctx.globalAlpha=1;

    // smoke (world space, on the ground)
    for(const q of smoke){ ctx.globalAlpha=0.5*(q.life/q.max); ctx.fillStyle="#e8e8e8";
      ctx.beginPath(); ctx.arc(q.x,q.y,q.r,0,6.28); ctx.fill(); }
    ctx.globalAlpha=1;

    ctx.restore();

    // ---- cars in SCREEN space: upright, constant 3D lighting, frame = angle vs camera ----
    const cosA=Math.cos(camAngle), sinA=Math.sin(camAngle);
    const w2s=(wx,wy)=>{ const rx=wx-camX, ry=wy-camY;
      return [W/2 + sc*(rx*cosA + ry*sinA), H/2 + sc*(-rx*sinA + ry*cosA)]; };
    if(bestGhost && bestGhost.length>1 && started){
      const tcur=performance.now()-lapStart;
      while(ghostCursor<bestGhost.length-1 && bestGhost[ghostCursor+1][0]<=tcur) ghostCursor++;
      const gp=bestGhost[Math.min(ghostCursor,bestGhost.length-1)];
      const g=w2s(gp[1],gp[2]);
      ctx.globalAlpha=0.4; drawCarScreen(g[0],g[1], gp[3]-camAngle, true, sc); ctx.globalAlpha=1;
    }
    { const p=w2s(car.x,car.y); drawCarScreen(p[0],p[1], car.heading-camAngle, false, sc); }

    if(car.speed>TOP*0.7){ ctx.strokeStyle="rgba(255,255,255,0.10)"; ctx.lineWidth=1;
      for(let i=0;i<5;i++){ const x=(i*53+(performance.now()/4))%W; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,14); ctx.stroke(); } }
  }

  function offsetInland(T){ const o=[]; for(let i=0;i<T.M;i++) o.push([T.pts[i][0]-T.nrm[i][0]*900, T.pts[i][1]-T.nrm[i][1]*900]); return o; }

  function drawKerb(edge, kerb){
    const M=edge.length;
    for(let i=0;i<M;i+=3){
      const j=(i+3)%M;
      ctx.fillStyle=((i/3)%2===0)?"#cf2b2b":"#eeeeee";
      ctx.beginPath();
      ctx.moveTo(edge[i][0],edge[i][1]); ctx.lineTo(edge[j][0],edge[j][1]);
      ctx.lineTo(kerb[j][0],kerb[j][1]); ctx.lineTo(kerb[i][0],kerb[i][1]); ctx.closePath(); ctx.fill();
    }
  }

  function drawStartLine(){
    const a=track.edgeL[0], b=track.edgeR[0];
    if(track.theme==='coast'){
      ctx.lineWidth=4; ctx.strokeStyle="#fff"; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke(); ctx.setLineDash([]);
    } else {
      // checkered start/finish band
      const n=8;
      for(let k=0;k<n;k++){
        const t0=k/n, t1=(k+1)/n;
        const x0=a[0]+(b[0]-a[0])*t0, y0=a[1]+(b[1]-a[1])*t0;
        const x1=a[0]+(b[0]-a[0])*t1, y1=a[1]+(b[1]-a[1])*t1;
        const tg=track.tan[0];
        ctx.fillStyle=(k%2)?"#111":"#fff";
        ctx.beginPath();
        ctx.moveTo(x0,y0); ctx.lineTo(x1,y1);
        ctx.lineTo(x1+tg[0]*6,y1+tg[1]*6); ctx.lineTo(x0+tg[0]*6,y0+tg[1]*6); ctx.closePath(); ctx.fill();
      }
    }
  }

  // Cars are drawn in SCREEN space so the pre-rendered 3D lighting stays constant
  // (sun from top-left) while the world rotates underneath. `relAngle` = car heading
  // minus camera angle: ~0 when cruising straight, so the sprite stays upright.
  function drawCarScreen(sx,sy,relAngle,ghost,sc){
    const sp=SPRITES[carKind];
    const useImg = sp && sp.ready;
    const sheet  = useImg && sp.frames>1;
    const cs = sc*CAR_SCALE;

    // soft contact shadow (constant top-left light)
    if(!ghost){
      ctx.save(); ctx.translate(sx+4*sc, sy+5*sc); ctx.rotate(relAngle);
      ctx.globalAlpha=0.28; ctx.fillStyle="#000";
      ctx.beginPath(); ctx.ellipse(0,0,9*cs,17*cs,0,0,6.28); ctx.fill();
      ctx.restore(); ctx.globalAlpha=1;
    }

    ctx.save(); ctx.translate(sx,sy);
    if(!sheet){ ctx.rotate(relAngle + (useImg?facingOffset(sp.facing):0)); if(!ghost) ctx.rotate(car.slip); }
    ctx.scale(cs,cs);
    if(useImg) drawSpriteImg(sp, relAngle, sheet);
    else if(carKind==='f1') drawF1(ghost); else drawMustang(ghost);
    ctx.restore();
  }

  function drawSpriteImg(sp, angle, sheet){
    const img=sp.img;
    if(sheet){
      const n=sp.frames;
      let a=angle*(sp.dir||1)+(sp.base||0);
      a=((a%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const f=Math.round(a/(2*Math.PI)*n)%n;
      const col=f%sp.cols, row=Math.floor(f/sp.cols);
      ctx.drawImage(img, col*sp.fw, row*sp.fh, sp.fw, sp.fh, -sp.dw/2, -sp.dh/2, sp.dw, sp.dh);
    } else {
      ctx.drawImage(img, -sp.dw/2, -sp.dh/2, sp.dw, sp.dh);
    }
  }

  function drawMustang(ghost){
    const L=30,Wd=16;
    ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.fillRect(-Wd/2+2,-L/2+3,Wd,L);
    ctx.fillStyle=ghost?"#bfe9f2":"#f2c233"; roundRect(-Wd/2,-L/2,Wd,L,3); ctx.fill();
    ctx.strokeStyle="#1a1a1a"; ctx.lineWidth=1.5; roundRect(-Wd/2,-L/2,Wd,L,3); ctx.stroke();
    if(ghost) return;
    ctx.fillStyle="#222"; ctx.fillRect(-3,-L/2+2,2,L-4); ctx.fillRect(1,-L/2+2,2,L-4);
    ctx.fillStyle="#2b3a4a"; ctx.fillRect(-Wd/2+2,-L/2+6,Wd-4,6); ctx.fillRect(-Wd/2+2,2,Wd-4,6);
    ctx.fillStyle="#e0b02e"; ctx.fillRect(-Wd/2+2,-2,Wd-4,4);
    ctx.fillStyle="#fff6c0"; ctx.fillRect(-Wd/2+1,-L/2+1,3,2); ctx.fillRect(Wd/2-4,-L/2+1,3,2);
    ctx.fillStyle="#c0392b"; ctx.fillRect(-Wd/2+1,L/2-3,3,2); ctx.fillRect(Wd/2-4,L/2-3,3,2);
    ctx.fillStyle="#111";
    const wh=(x,y,st)=>{ ctx.save(); ctx.translate(x,y); ctx.rotate(st); ctx.fillRect(-2,-4,4,8); ctx.restore(); };
    wh(-Wd/2-1,-L/2+7,car.steer*0.4); wh(Wd/2+1,-L/2+7,car.steer*0.4); wh(-Wd/2-1,L/2-7,0); wh(Wd/2+1,L/2-7,0);
  }

  function drawF1(ghost){
    const L=34;
    // wheels (exposed, outboard) — front steer
    ctx.fillStyle="#0a0a0a";
    const wh=(x,y,st)=>{ ctx.save(); ctx.translate(x,y); ctx.rotate(st); ctx.fillRect(-2.5,-5,5,10); ctx.restore(); };
    wh(-10,-L/2+9,car.steer*0.4); wh(10,-L/2+9,car.steer*0.4);   // front
    wh(-11,L/2-9,0); wh(11,L/2-9,0);                               // rear (wider)
    // shadow
    ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.fillRect(-4,-L/2+5,8,L-6);
    // body: nose cone -> cockpit -> engine
    const body=ghost?"#bfe9f2":"#d11e2a";
    ctx.fillStyle=body;
    ctx.beginPath();
    ctx.moveTo(0,-L/2);            // nose tip (front)
    ctx.lineTo(4,-L/2+12);
    ctx.lineTo(5,L/2-12);
    ctx.lineTo(7,L/2-2);
    ctx.lineTo(-7,L/2-2);
    ctx.lineTo(-5,L/2-12);
    ctx.lineTo(-4,-L/2+12);
    ctx.closePath(); ctx.fill();
    if(ghost) { return; }
    // front wing (wide, front)
    ctx.fillStyle="#1a1a1a"; ctx.fillRect(-13,-L/2+1,26,3);
    // rear wing (wide, back)
    ctx.fillStyle="#1a1a1a"; ctx.fillRect(-12,L/2-4,24,4);
    // sidepods
    ctx.fillStyle="#222"; ctx.fillRect(-8,-2,3,10); ctx.fillRect(5,-2,3,10);
    // cockpit + halo
    ctx.fillStyle="#111"; ctx.beginPath(); ctx.ellipse(0,1,3,5,0,0,6.28); ctx.fill();
    ctx.strokeStyle="#888"; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,-2,3,0,Math.PI); ctx.stroke();
    // accent stripe
    ctx.fillStyle="#fff"; ctx.fillRect(-1,-L/2+4,2,L-10);
  }

  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  // ----------------------- Menu -----------------------
  function bestFor(name){ try{ const b=localStorage.getItem("cc_best_"+name); return b?+b:null; }catch(_){ return null; } }
  function buildMenu(){
    const wrap=document.getElementById("cards"); wrap.innerHTML="";
    TRACK_DEFS.forEach((def)=>{
      const c=document.createElement("div"); c.className="card";
      c.innerHTML=`<div class="t">${def.name}</div>
        <div class="d">${def.info}</div>
        <div class="car">${def.car==='f1'?'🏎️ F1':'🚗 Mustang'}</div>
        <div class="pb">PB ${fmt(bestFor(def.name))}</div>`;
      c.addEventListener("pointerdown",(e)=>{ e.stopPropagation(); loadTrack(def); });
      wrap.appendChild(c);
    });
  }

  buildMenu();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
