<title>Grand Tour — 3D</title>
<style>
  :root { --ui: #fff3d6; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#06131e; }
  body { font-family:"Courier New",monospace; touch-action:none; user-select:none; }
  #stage { position:relative; width:100vw; height:100vh; }
  canvas { display:block; }
  #crt { position:absolute; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(120% 120% at 50% 50%, rgba(0,0,0,0) 62%, rgba(0,0,0,.38) 100%); }
  #hud { position:absolute; inset:0; pointer-events:none; z-index:6; color:var(--ui);
    text-shadow:2px 2px 0 #00000088; letter-spacing:1px; }
  .panel { position:absolute; }
  #times { top:14px; left:16px; font-size:clamp(12px,2.4vw,18px); line-height:1.5; }
  #times b { color:#ffd34d; } #best { color:#8be9a8; } #trackname { color:#9fd4ff; font-weight:bold; }
  #speedo { right:16px; bottom:16px; text-align:right; }
  #kmh { font-size:clamp(34px,9vw,64px); font-weight:bold; color:#ffd34d; line-height:.9; }
  #kmh small { font-size:.35em; color:var(--ui); }
  #bar { width:clamp(120px,30vw,220px); height:10px; margin-top:8px; margin-left:auto; border:2px solid #ffffff55; background:#0008; }
  #barfill { height:100%; width:0%; background:linear-gradient(90deg,#7ee07e,#ffd34d,#ff7a3d); }
  .btn { position:absolute; bottom:18px; z-index:7; pointer-events:auto; padding:12px 16px;
    font-family:inherit; font-weight:bold; letter-spacing:1px; font-size:clamp(13px,3.2vw,19px);
    color:#06131e; background:#ffd34d; border:3px solid #fff3d6; border-radius:8px; cursor:pointer;
    box-shadow:0 4px 0 #0007; transition:transform .05s; }
  .btn:active { transform:translateY(3px); box-shadow:0 1px 0 #0007; }
  #retry { left:16px; } #menuBtn { left:50%; transform:translateX(-50%); background:#9fd4ff; }
  #menuBtn:active { transform:translateX(-50%) translateY(3px); }
  #lapmsg { position:absolute; top:15%; left:0; right:0; text-align:center; font-size:clamp(20px,6vw,44px);
    font-weight:bold; color:#fff; opacity:0; transition:opacity .25s; text-shadow:3px 3px 0 #c0392b; }
  #menu { position:absolute; inset:0; z-index:10; overflow-y:auto; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start; padding:6vh 5vw; gap:14px; text-align:center; color:var(--ui);
    background:radial-gradient(120% 120% at 50% 20%, #1a3a52 0%, #06131e 80%); }
  #menu h1 { font-size:clamp(26px,7vw,56px); color:#ffd34d; text-shadow:4px 4px 0 #c0392b; letter-spacing:2px; }
  #menu .sub { font-size:clamp(12px,3vw,17px); max-width:560px; line-height:1.6; opacity:.9; }
  #cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; width:100%; max-width:620px; margin-top:8px; }
  .card { pointer-events:auto; cursor:pointer; text-align:left; background:#0e2433; border:3px solid #2c5870;
    border-radius:12px; padding:14px; transition:transform .08s,border-color .08s; color:var(--ui); }
  .card:hover,.card:active { transform:translateY(-3px); border-color:#ffd34d; }
  .card .t { font-size:clamp(16px,4vw,22px); font-weight:bold; color:#ffd34d; }
  .card .d { font-size:12px; opacity:.8; margin-top:4px; }
  .card .pb { font-size:13px; color:#8be9a8; margin-top:8px; }
  .card .car { font-size:11px; opacity:.7; margin-top:2px; }
  #loading { position:absolute; inset:0; z-index:11; display:flex; align-items:center; justify-content:center;
    background:#06131e; color:#ffd34d; font-size:clamp(16px,4vw,24px); text-align:center; padding:20px; }
  .hide { display:none !important; }
</style>
</head>

/* ===================== track maths (2D, on the X/Z plane) ===================== */
function catmull(p0,p1,p2,p3,t){ const t2=t*t,t3=t2*t; return [
  0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
  0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)]; }
function makeCoastCP(){ const cp=[],N=16,RX=760,RY=540; for(let i=0;i<N;i++){ const a=(i/N)*Math.PI*2;
  const r=1+0.22*Math.sin(3*a+0.6)+0.13*Math.cos(2*a)+0.07*Math.sin(5*a); cp.push([Math.cos(a)*RX*r,Math.sin(a)*RY*r]); } return cp; }

function buildTrack(def){
  const tscale=def.scale||1, cp=def.cp.map(p=>[p[0]*tscale,p[1]*tscale]), sub=def.subdiv, pts=[];
  for(let i=0;i<cp.length;i++){ const p0=cp[(i-1+cp.length)%cp.length],p1=cp[i],p2=cp[(i+1)%cp.length],p3=cp[(i+2)%cp.length];
    for(let s=0;s<sub;s++) pts.push(catmull(p0,p1,p2,p3,s/sub)); }
  const M=pts.length, tan=[], nrm=[];
  for(let i=0;i<M;i++){ const a=pts[(i-1+M)%M],b=pts[(i+1)%M]; let tx=b[0]-a[0],ty=b[1]-a[1];
    const l=Math.hypot(tx,ty)||1; tx/=l; ty/=l; tan.push([tx,ty]); nrm.push([ty,-tx]); }
  const edge=d=>{const o=[];for(let i=0;i<M;i++)o.push([pts[i][0]+nrm[i][0]*d,pts[i][1]+nrm[i][1]*d]);return o;};
  return { name:def.name, theme:def.theme, info:def.info, car:def.car, pts, tan, nrm, M,
           edgeL:edge(ROAD_HALF), edgeR:edge(-ROAD_HALF),
           beachOuter:edge(ROAD_HALF+BEACH_W), inland:edge(-INLAND),
           kerbL:edge(ROAD_HALF+7), kerbR:edge(-ROAD_HALF-7) };
}

function ribbon(loopA, loopB, y, color){
  const M=loopA.length, pos=[], idx=[];
  for(let i=0;i<M;i++){ pos.push(loopA[i][0],y,loopA[i][1]); pos.push(loopB[i][0],y,loopB[i][1]); }
  for(let i=0;i<M;i++){ const a=2*i,b=2*i+1,c=2*((i+1)%M),d=c+1; idx.push(a,b,d, a,d,c); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3)); g.setIndex(idx); g.computeVertexNormals();
  const m=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color,roughness:1,metalness:0,side:THREE.DoubleSide}));
  m.receiveShadow=true; return m;
}
function kerbMesh(edge, kerb){
  const M=edge.length, pos=[], col=[]; const red=[0.81,0.17,0.17], white=[0.93,0.93,0.93];
  for(let i=0;i<M;i+=2){ const j=(i+2)%M; const c=((i/2)%2===0)?red:white; const A=edge[i],B=edge[j],C=kerb[j],D=kerb[i], y=0.7;
    const quad=[A,B,C,A,C,D]; for(const p of quad){ pos.push(p[0],y,p[1]); col.push(c[0],c[1],c[2]); } }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(col,3)); g.computeVertexNormals();
  const m=new THREE.Mesh(g,new THREE.MeshStandardMaterial({vertexColors:true,roughness:1})); m.receiveShadow=true; return m;
}
function dashMesh(pts,tan,M,y,color,step){
  const pos=[],idx=[]; let v=0;
  for(let i=0;i<M;i+=step){ const t=tan[i],c=pts[i],px=-t[1],pz=t[0],len=10,w=1.6;
    pos.push(c[0]+t[0]*len-px*w,y,c[1]+t[1]*len-pz*w, c[0]+t[0]*len+px*w,y,c[1]+t[1]*len+pz*w,
             c[0]-t[0]*len+px*w,y,c[1]-t[1]*len+pz*w, c[0]-t[0]*len-px*w,y,c[1]-t[1]*len-pz*w);
    idx.push(v,v+1,v+2,v,v+2,v+3); v+=4; }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3)); g.setIndex(idx); g.computeVertexNormals();
  return new THREE.Mesh(g,new THREE.MeshStandardMaterial({color,roughness:1}));
}
function startLineMesh(T){
  const a=T.edgeL[0],b=T.edgeR[0],t=T.tan[0],pos=[],col=[],idx=[]; const n=10,depth=14; let v=0;
  for(let k=0;k<n;k++){ const t0=k/n,t1=(k+1)/n;
    const x0=a[0]+(b[0]-a[0])*t0,z0=a[1]+(b[1]-a[1])*t0, x1=a[0]+(b[0]-a[0])*t1,z1=a[1]+(b[1]-a[1])*t1;
    const c=(k%2)?[0.07,0.07,0.07]:[0.95,0.95,0.95];
    const P=[[x0,z0],[x1,z1],[x1+t[0]*depth,z1+t[1]*depth],[x0+t[0]*depth,z0+t[1]*depth]];
    for(const o of [0,1,2,0,2,3]){ pos.push(P[o][0],0.9,P[o][1]); col.push(c[0],c[1],c[2]); } }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(col,3)); g.computeVertexNormals();
  return new THREE.Mesh(g,new THREE.MeshStandardMaterial({vertexColors:true,roughness:1}));
}

function build3D(T){

  trackGroup=new THREE.Group(); scene.add(trackGroup);

    const water=new THREE.Mesh(new THREE.PlaneGeometry(24000,24000),
      new THREE.MeshStandardMaterial({color:0x1d6e8c,roughness:0.5,metalness:0.15}));
    water.rotation.x=-Math.PI/2; water.position.y=-0.6; water.receiveShadow=true; trackGroup.add(water);
    trackGroup.add(ribbon(T.beachOuter,T.inland,0.0,0x5a8a4a));
    trackGroup.add(ribbon(T.beachOuter,T.edgeL,0.15,0xe8d39b));
    trackGroup.add(ribbon(T.edgeL,T.edgeR,0.3,0x3a3f45));
    trackGroup.add(dashMesh(T.pts,T.tan,T.M,0.35,0xf4d35e,4));
  } else {
    scene.background=new THREE.Color(0x9fc6e8); scene.fog=new THREE.Fog(0x9fc6e8,2000,5600);
    const grass=new THREE.Mesh(new THREE.PlaneGeometry(24000,24000),
      new THREE.MeshStandardMaterial({color:0x4e7d3a,roughness:1}));
    grass.rotation.x=-Math.PI/2; grass.receiveShadow=true; trackGroup.add(grass);
    trackGroup.add(ribbon(T.kerbL,T.kerbR,0.2,0xb8a06a));
    trackGroup.add(ribbon(T.edgeL,T.edgeR,0.4,0x33373d));
    trackGroup.add(kerbMesh(T.edgeL,T.kerbL));
    trackGroup.add(kerbMesh(T.edgeR,T.kerbR));
  }
  trackGroup.add(startLineMesh(T));
  decorate(T);
}

const loader=new GLTFLoader();
const carModels={};
function b64ToBuf(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u.buffer; }
function loadCar(kind,b64,tintHex){
  return new Promise((res,rej)=>{
    loader.parse(b64ToBuf(b64),'',(g)=>{
      const obj=g.scene;
      const box=new THREE.Box3().setFromObject(obj), size=box.getSize(new THREE.Vector3());
      obj.scale.setScalar(CAR_LEN/size.z);
      const box2=new THREE.Box3().setFromObject(obj), c=box2.getCenter(new THREE.Vector3());
      obj.position.x-=c.x; obj.position.z-=c.z; obj.position.y-=box2.min.y;
      if(tintHex){ let big=null,bv=-1; obj.traverse(o=>{ if(o.isMesh){ const n=o.geometry.attributes.position.count; if(n>bv){bv=n;big=o;} } });
        if(big){ big.material=big.material.clone(); big.material.color=new THREE.Color(tintHex); } }
      obj.traverse(o=>{ if(o.isMesh) o.castShadow=true; });
      const wrap=new THREE.Group(); wrap.add(obj); carModels[kind]=wrap; res();
    }, rej);
  });
}
function instanceCar(kind,ghost){
  const m=carModels[kind].clone(true);
  if(ghost){ m.traverse(o=>{ if(o.isMesh){ o.castShadow=false; o.material=o.material.clone();
    o.material.transparent=true; o.material.opacity=0.4; o.material.depthWrite=false; } }); }
  scene.add(m); return m;
}

/* ===================== trackside props (Kenney kit models) ===================== */
const propModels={};
function prepProp(obj){
  let box=new THREE.Box3().setFromObject(obj), c=box.getCenter(new THREE.Vector3());
  obj.position.x-=c.x; obj.position.z-=c.z; obj.position.y-=box.min.y;   // centre on XZ, sit on ground
  const size=new THREE.Box3().setFromObject(obj).getSize(new THREE.Vector3());
  obj.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=false; } });
  const wrap=new THREE.Group(); wrap.add(obj);
  return { wrap, size };
}
function loadProp(name,b64){ return new Promise((res,rej)=>{ loader.parse(b64ToBuf(b64),'',g=>{ propModels[name]=prepProp(g.scene); res(); }, rej); }); }
function placeProp(name,x,z,targetH,yaw,jitter){
  const t=propModels[name]; if(!t) return null;
  const m=t.wrap.clone(true);
  m.scale.setScalar(targetH/t.size.y*(1+(Math.random()-0.5)*(jitter||0)));
  m.position.set(x,0,z); m.rotation.y=yaw; return m;
}
function barrierYaw(name,tx,tz){ const s=propModels[name].size;
  return (s.x>=s.z) ? Math.atan2(-tz,tx) : Math.atan2(tx,tz); }   // align long axis with tangent
function faceYaw(dx,dz){ return Math.atan2(-dx,-dz)+PROP_FACE_YAW; } // make front(-Z) point along (dx,dz)

function decorate(T){
  const g=new THREE.Group(); trackGroup.add(g);
  const M=T.M,pts=T.pts,tan=T.tan,nrm=T.nrm,coast=(T.theme==='coast');
  // barriers hugging both edges (circuits)
  if(!coast){
    for(let i=0;i<M;i+=8){ const tx=tan[i][0],tz=tan[i][1];
      for(const side of [1,-1]){ const off=ROAD_HALF+10;
        const x=pts[i][0]+nrm[i][0]*off*side, z=pts[i][1]+nrm[i][1]*off*side;
        const name=((i/8)%2===0)?'barrierRed':'barrierWhite';
        const m=placeProp(name,x,z,7,barrierYaw(name,tx,tz),0); if(m) g.add(m); } }
  }
  // trees on the grass / inland
  for(let i=0;i<M;i+=10){ const sides=coast?[-1]:[1,-1];
    for(const side of sides){ if(Math.random()<0.45) continue;
      const off=ROAD_HALF+55+Math.random()*340;
      const x=pts[i][0]+nrm[i][0]*off*side, z=pts[i][1]+nrm[i][1]*off*side;
      const big=Math.random()<0.6;
      const m=placeProp(big?'treeLarge':'treeSmall',x,z,big?64:42,Math.random()*6.28,0.35); if(m) g.add(m); } }
  // grandstands + billboards facing the track from the inland side (circuits)
  if(!coast){
    const gs=Math.max(1,Math.floor(M/7));
    for(let i=0;i<M;i+=gs){ const off=ROAD_HALF+85;
      const x=pts[i][0]-nrm[i][0]*off, z=pts[i][1]-nrm[i][1]*off;
      const m=placeProp('grandStand',x,z,40,faceYaw(nrm[i][0],nrm[i][1]),0); if(m) g.add(m); }
    const bb=Math.max(1,Math.floor(M/5));
    for(let i=Math.floor(M/11);i<M;i+=bb){ const off=ROAD_HALF+45;
      const x=pts[i][0]-nrm[i][0]*off, z=pts[i][1]-nrm[i][1]*off;
      const m=placeProp('billboard',x,z,28,faceYaw(nrm[i][0],nrm[i][1]),0); if(m) g.add(m); }
  }
}

function applyPointer(dx){

  v = v<=STEER_DEADZONE ? 0 : (v-STEER_DEADZONE)/(1-STEER_DEADZONE); // dead zone near press point
  steerTarget = s*Math.pow(v, STEER_EXPO);                          // gentle near centre
}

  if(e.key==="ArrowRight"||e.key==="d"){keyR=true;steerTarget=1;}
  if((e.key==="r"||e.key==="R"||e.key==="Enter")&&started) resetToStart(); });
addEventListener("keyup",e=>{ if(e.key==="ArrowLeft"||e.key==="a")keyL=false; if(e.key==="ArrowRight"||e.key==="d")keyR=false;
  steerTarget=keyL?-1:keyR?1:(pointerActive?steerTarget:0); });
document.getElementById("retry").addEventListener("pointerdown",e=>{ e.stopPropagation(); if(started) resetToStart(); });
document.getElementById("menuBtn").addEventListener("pointerdown",e=>{ e.stopPropagation(); openMenu(); });

/* ===================== timing + ghost ===================== */
let lapStart=0,bestLap=null,prevProg=0,ghostRec=[],bestGhost=null,ghostCursor=0;
const el=id=>document.getElementById(id);
const lapEl=el("curtime"),bestEl=el("best"),nameEl=el("trackname"),kmhEl=el("kmh"),barFill=el("barfill"),lapMsg=el("lapmsg");
const keyBest=()=>"cc3_best_"+track.name, keyGhost=()=>"cc3_ghost_"+track.name;
function fmt(ms){ if(ms==null)return"--:--.--"; const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);
  return m+":"+String(s).padStart(2,"0")+"."+String(cs).padStart(2,"0"); }
let msgTimer=0; function flash(t,ms=1600){ lapMsg.textContent=t; lapMsg.style.opacity=1; msgTimer=ms; }

function resetToStart(){
  const p=track.pts,t=track.tan; car.x=p[0][0]; car.y=p[0][1];
  car.heading=Math.atan2(t[0][0],-t[0][1]); car.speed=MIN_SPEED; car.steer=0; car.nearIdx=0; car.slip=0;
  prevProg=0; lapStart=performance.now(); ghostRec=[]; ghostCursor=0; camInit=false;
  for(const q of smokePool){ q.s.visible=false; q.life=0; } smokeAcc=0;
}
function loadTrack(def){
  track=buildTrack(def); carKind=def.car; build3D(track);
  if(playerCar) scene.remove(playerCar); if(ghostCar){ scene.remove(ghostCar); ghostCar=null; }
  playerCar=instanceCar(carKind,false);
  bestLap=null; bestGhost=null;
  try{ const b=localStorage.getItem(keyBest()); if(b)bestLap=+b; const g=localStorage.getItem(keyGhost()); if(g)bestGhost=JSON.parse(g); }catch(_){}
  if(bestGhost) ghostCar=instanceCar(carKind,true);
  nameEl.textContent=track.name.toUpperCase(); bestEl.textContent="BEST "+fmt(bestLap);
  document.getElementById("menu").classList.add("hide"); started=true; resetToStart();
}
function openMenu(){ started=false; buildMenu(); document.getElementById("menu").classList.remove("hide"); }

function updateNearest(){ const p=track.pts,M=track.M; let best=car.nearIdx,bd=Infinity;
  for(let d=-12;d<=44;d++){ const i=(car.nearIdx+d+M)%M; const dx=car.x-p[i][0],dy=car.y-p[i][1],dist=dx*dx+dy*dy;
    if(dist<bd){bd=dist;best=i;} } car.nearIdx=best; }

function spawnSmoke(x,z){ const q=smokePool[smokeNext]; smokeNext=(smokeNext+1)%smokePool.length;
  q.s.visible=true; q.s.position.set(x,2,z); q.life=q.max=0.7; q.r0=8; q.s.scale.setScalar(8); q.s.material.opacity=0.55; }

function step(dt){
  const p=track.pts,t=track.tan,nrm=track.nrm,M=track.M;
  car.steer+=(steerTarget-car.steer)*(1-Math.exp(-10*dt));
  const speedFactor=Math.min(1,car.speed/70+0.15), grip=1-UNDERSTEER*(car.speed/TOP);
  car.heading+=car.steer*TURN*speedFactor*grip*dt;

  updateNearest();
  const i=car.nearIdx,cpx=p[i][0],cpy=p[i][1],n=nrm[i];
  const signed=(car.x-cpx)*n[0]+(car.y-cpy)*n[1], onRoad=Math.abs(signed)<=ROAD_HALF;
  const top=onRoad?TOP:TOP_OFF;
  car.speed+=(top-car.speed)*(1-Math.exp(-ENGINE*dt));
  car.speed-=CORNER_SCRUB*Math.abs(car.steer)*(car.speed/TOP)*car.speed*dt;
  if(!onRoad) car.speed-=car.speed*0.6*dt; if(car.speed<MIN_SPEED)car.speed=MIN_SPEED;

  const fx=Math.sin(car.heading), fy=-Math.cos(car.heading);
  car.x+=fx*car.speed*dt; car.y+=fy*car.speed*dt;

  const limit=ROAD_HALF+WALL_PAD, s2=(car.x-cpx)*n[0]+(car.y-cpy)*n[1];
  if(Math.abs(s2)>limit){ const s=Math.sign(s2); car.x=cpx+n[0]*limit*s; car.y=cpy+n[1]*limit*s; car.speed*=WALL_HIT; if(msgTimer<=0)flash("WALL!",600); }

  const drift=Math.max(0,Math.abs(car.steer)*(car.speed/TOP)-DRIFT_START)/(1-DRIFT_START);
  car.slip+=(-car.steer*0.5*drift-car.slip)*(1-Math.exp(-9*dt));
  if(drift>0.05 && onRoad){ smokeAcc+=SMOKE_RATE*drift*dt; while(smokeAcc>=1){ smokeAcc-=1; spawnSmoke(car.x-fx*14,car.y-fy*14); } }
  for(const q of smokePool){ if(q.life>0){ q.life-=dt; if(q.life<=0){q.s.visible=false;continue;}
    q.s.position.y+=12*dt; q.s.material.opacity=0.55*(q.life/q.max); q.s.scale.setScalar(q.r0+(1-q.life/q.max)*26); } }

  const tcur=performance.now()-lapStart;
  if(ghostRec.length===0||tcur-ghostRec[ghostRec.length-1][0]>=16) ghostRec.push([tcur,car.x,car.y,car.heading]);

  const prog=i/M;
  if(prevProg>0.8&&prog<0.2){ const lap=performance.now()-lapStart; lapStart=performance.now();
    if(bestLap===null||lap<bestLap){ bestLap=lap; bestEl.textContent="BEST "+fmt(bestLap); bestGhost=ghostRec.slice();
      if(!ghostCar) ghostCar=instanceCar(carKind,true); flash("NEW BEST!  "+fmt(lap));
      try{ localStorage.setItem(keyBest(),String(bestLap)); localStorage.setItem(keyGhost(),JSON.stringify(bestGhost)); }catch(_){}
    } else flash("LAP  "+fmt(lap));
    ghostRec=[]; ghostCursor=0; }
  prevProg=prog;

  kmhEl.innerHTML=Math.round(car.speed*KMH)+"<small>KM/H</small>";
  barFill.style.width=Math.min(100,(car.speed/TOP)*100)+"%";
  lapEl.textContent=fmt(performance.now()-lapStart);
  if(msgTimer>0){ msgTimer-=dt*1000; if(msgTimer<=0)lapMsg.style.opacity=0; }
}

function place(obj,x,z,heading){ obj.position.set(x,0,z); obj.rotation.set(0,-heading+CAR_MODEL_YAW,0); }

function updateCamera(dt){
  const fx=Math.sin(car.heading), fz=-Math.cos(car.heading);
  const want=new THREE.Vector3(car.x-fx*CAM_BACK, CAM_HEIGHT, car.y-fz*CAM_BACK);
  const at=new THREE.Vector3(car.x+fx*CAM_AHEAD, 6, car.y+fz*CAM_AHEAD);
  if(!camInit){ camPos.copy(want); camAt.copy(at); camInit=true; }
  const k=1-Math.exp(-CAM_LERP*dt); camPos.lerp(want,k); camAt.lerp(at,k);
  camera.position.copy(camPos); camera.lookAt(camAt);
  sun.position.set(car.x-500,1100,car.y+400); sun.target.position.set(car.x,0,car.y);
}

/* ===================== loop ===================== */
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(started){
    step(dt);
    place(playerCar,car.x,car.y,car.heading); playerCar.rotation.z=car.slip*0.5;
    if(ghostCar && bestGhost && bestGhost.length>1){
      const tcur=performance.now()-lapStart;
      while(ghostCursor<bestGhost.length-1 && bestGhost[ghostCursor+1][0]<=tcur) ghostCursor++;
      const gp=bestGhost[Math.min(ghostCursor,bestGhost.length-1)];
      ghostCar.visible=true; place(ghostCar,gp[1],gp[2],gp[3]);
    } else if(ghostCar) ghostCar.visible=false;
    updateCamera(dt);
  }
  renderer.render(scene,camera);
  requestAnimationFrame(frame);
}

/* ===================== menu / boot ===================== */
function bestFor(name){ try{ const b=localStorage.getItem("cc3_best_"+name); return b?+b:null; }catch(_){return null;} }
function buildMenu(){ const wrap=document.getElementById("cards"); wrap.innerHTML="";
  TRACK_DEFS.forEach(def=>{ const c=document.createElement("div"); c.className="card";
    c.innerHTML=`<div class="t">${def.name}</div><div class="d">${def.info}</div>
      <div class="car">${def.car==='f1'?'🏎️ F1':'🚗 Mustang'}</div><div class="pb">PB ${fmt(bestFor(def.name))}</div>`;
    c.addEventListener("pointerdown",e=>{ e.stopPropagation(); loadTrack(def); }); wrap.appendChild(c); }); }

const GLB=JSON.parse(document.getElementById("glb-data").textContent);
const PR=JSON.parse(document.getElementById("prop-data").textContent);
Promise.all([ loadCar("f1",GLB.f1,null), loadCar("mustang",GLB.mustang,"#f2c233"),
  loadProp("treeLarge",PR.treeLarge), loadProp("treeSmall",PR.treeSmall),
  loadProp("barrierRed",PR.barrierRed), loadProp("barrierWhite",PR.barrierWhite),
  loadProp("grandStand",PR.grandStand), loadProp("billboard",PR.billboard) ])
  .then(()=>{ document.getElementById("loading").classList.add("hide");
    buildMenu(); document.getElementById("menu").classList.remove("hide"); requestAnimationFrame(frame); })
  .catch(err=>{ document.getElementById("loading").textContent="Erreur de chargement des modèles 3D : "+err; console.error(err); });
</script>
</body>
